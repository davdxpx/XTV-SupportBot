name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/xtv_support || true   # tolerant in v0.9; tightens in v1.0

  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      API_ID: "1"
      API_HASH: "x"
      BOT_TOKEN: "1:x"
      MONGO_URI: "mongodb://localhost:27017/test"
      ADMIN_CHANNEL_ID: "-1001234567890"
      ADMIN_IDS: "1"
      LOG_LEVEL: "WARNING"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[all]'
      - run: pytest --cov=src/xtv_support --cov-report=xml --cov-report=term
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test, test-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/xtv-support:sha-${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/xtv-support:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
