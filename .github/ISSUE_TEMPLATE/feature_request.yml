name: "Feature request"
description: "Propose a new feature or enhancement."
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that the current bot doesn't support well?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Mock screenshots / command flows welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought of that don't quite fit.

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Nice-to-have
        - Would use regularly
        - Blocks my usage
    validations:
      required: true
