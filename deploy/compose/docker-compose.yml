# XTV-SupportBot — local development stack.
#
# Usage:
#   docker compose -f deploy/compose/docker-compose.yml up
#
# Ports:
#   8000  FastAPI (if API_ENABLED=true)
#  27017  Mongo
#   6379  Redis
#   9090  Prometheus (optional profile: observability)
#   3000  Grafana    (optional profile: observability)

services:
  bot:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - ../../.env
    environment:
      MONGO_URI: mongodb://mongo:27017/xtv_support
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8000:8000"

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mongo_data:
  grafana_data:
