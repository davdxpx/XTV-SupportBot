# Raw Kubernetes manifest for operators who prefer not to run Helm.
# Create the xtv-support-secrets Secret separately (see README).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: xtv-support
  labels:
    app.kubernetes.io/name: xtv-support
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: xtv-support
  template:
    metadata:
      labels:
        app.kubernetes.io/name: xtv-support
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: bot
          image: ghcr.io/davdxpx/xtv-support:0.9.0
          env:
            - name: LOG_LEVEL
              value: "INFO"
            - name: DEFAULT_LANG
              value: "en"
          envFrom:
            - secretRef:
                name: xtv-support-secrets
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: xtv-support
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: xtv-support
  ports:
    - name: http
      port: 8000
      targetPort: http
