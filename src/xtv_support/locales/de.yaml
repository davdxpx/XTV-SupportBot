# =============================================================================
# German — full coverage. Mirrors en.yaml; anything omitted falls back to en.
# =============================================================================

meta:
  code: de
  name: German
  native_name: Deutsch
  flag: "\U0001F1E9\U0001F1EA"   # 🇩🇪

# ---- User-facing (DM) ------------------------------------------------------
user:
  welcome: "👋 Willkommen! Sende /start, um ein Ticket zu öffnen."
  welcome_back: "👋 Willkommen zurück, {name}."
  pick_project: "Wähle ein Projekt:"
  project_not_found: "Dieses Projekt existiert nicht mehr."
  blocked: "⛔ Du wurdest für die Nutzung dieses Bots gesperrt."
  cooldown: "⏱️ Bitte langsamer — du kannst in {seconds}s wieder schreiben."
