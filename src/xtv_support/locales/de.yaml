  ticket_closed: "✅ Dein Ticket wurde geschlossen. Sende /start für ein neues."
  ticket_reopened: "🔓 Dein Ticket wurde wieder geöffnet."
  reply_received: "💬 Antwort vom Support erhalten."
  unknown_command: "Diesen Befehl kenne ich nicht. Versuch es mit /start."
